<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter un article | CEPI Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CEPI · Blog</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- FORMULARIO DE NUEVO POST -->
  <main class="container my-5">
    <h1 class="text-center mb-4">Ajouter un nouvel article</h1>

    <form id="addPostForm" class="mx-auto" style="max-width:600px;">
      <div class="mb-3">
        <label for="title" class="form-label">Titre</label>
        <input type="text" class="form-control" id="title" placeholder="Titre de l'article">
      </div>

      <div class="mb-3">
        <label for="author" class="form-label">Auteur</label>
        <input type="text" class="form-control" id="author" placeholder="Nom de l'auteur">
      </div>

      <div class="mb-3">
        <label for="content" class="form-label">Contenu</label>
        <textarea class="form-control" id="content" rows="6" placeholder="Écrivez le contenu ici..."></textarea>
      </div>

      <button type="button" class="btn btn-primary w-100" id="submitPost">Publier</button>
    </form>
  </main>

  <!-- FOOTER -->
  <footer class="footer text-center py-4 bg-light mt-5">
    <p class="mb-0">
      Centre d’Expertise et de Perfectionnement en Informatique<br>
      <small>2022</small>
    </p>
  </footer>

  <!-- Scripts -->
  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
