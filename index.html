<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CEPI | Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS & Icons -->
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CEPI · Blog</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Menu2</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Menu3</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Menu4</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- POSTS -->
  <main class="container my-4">
    <div id="postsContainer" class="row g-4">

      <!-- TARJETAS HARD-CODEADAS COMO FALLBACK -->
      <div class="col-12 col-lg-4">
        <article class="card h-100">
          <img src="img/post1.jpg" class="card-img-top" alt="Titre 1">
          <div class="card-body">
            <h5 class="card-title">Titre 1</h5>
            <p class="card-text">Contenu de la publication 1...</p>
          </div>
          <div class="card-footer bg-white border-0">
            <a href="post.html?id=1" class="btn btn-outline-primary w-100">Lire l’article</a>
          </div>
        </article>
      </div>

      <div class="col-12 col-lg-4">
        <article class="card h-100">
          <img src="img/post2.jpg" class="card-img-top" alt="Titre 2">
          <div class="card-body">
            <h5 class="card-title">Titre 2</h5>
            <p class="card-text">Contenu de la publication 2...</p>
          </div>
          <div class="card-footer bg-white border-0">
            <a href="post.html?id=2" class="btn btn-outline-primary w-100">Lire l’article</a>
          </div>
        </article>
      </div>

      <!-- Puedes agregar más tarjetas de ejemplo aquí -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer text-center py-4 bg-light mt-5">
    <p class="mb-0">Centre d’Expertise et de Perfectionnement en Informatique<br><small>2022</small></p>
  </footer>

  <!-- Scripts -->
  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
