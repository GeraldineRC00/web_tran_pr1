<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CEPI | Article</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CEPI · Blog</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Menu2</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Menu3</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Menu4</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- POST -->
  <main class="container post-content my-5">
    <h1 class="post-title text-center mb-4"></h1>
    <div id="postBody"></div>

    <!-- COMMENTS -->
    <section class="comments mt-5">
      <h3 class="mb-3">Commentaires</h3>

      <!-- Formulario de comentario -->
      <form id="commentForm" class="mb-4">
        <textarea id="commentInput" class="form-control mb-3" rows="4" placeholder="Votre commentaire"></textarea>
        <button type="button" class="btn btn-dark px-4" id="sendComment">Envoyer</button>
      </form>

      <div id="commentsContainer">
        <!-- Comentarios dinámicos  -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer text-center py-4 bg-light mt-5">
    <p class="mb-0">
      Centre d’Expertise et de Perfectionnement en Informatique<br>
      <small>2022</small>
    </p>
  </footer>

  <!-- Scripts -->
  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
